<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1280">
<meta name="robots" content="noindex, nofollow">
<title>Uplyncio Publisher — Admin View</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#f0f2f7}
iframe{width:100%;height:100%;border:none}
</style>
</head>
<body>
<iframe id="pubFrame" src="publisher.html"></iframe>
<script>
// Set admin session before iframe loads so publisher.html skips role guard
localStorage.setItem('uplyncio_admin_sess','1');
var user = JSON.parse(localStorage.getItem('uplyncio_user')||'null');
if(!user || (user.email||'').toLowerCase() !== 'info@uplyncio.com'){
  // Auto-set team account for admin view
  var teamUser = {
    id:'uplyncio_team_official',
    email:'info@uplyncio.com',
    name:'Uplyncio Team',
    role:'publisher',
    verified:true,
    email_verified:true,
    publisher_verified:true
  };
  localStorage.setItem('uplyncio_user', JSON.stringify(teamUser));
  localStorage.setItem('uplyncio_loggedIn','1');
  localStorage.setItem('uplyncio_currentUid','uplyncio_team_official');
}
// Reload iframe after session is set
document.getElementById('pubFrame').src = 'publisher.html';
</script>
</body>
</html>
