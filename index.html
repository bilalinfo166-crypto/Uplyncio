<head>

  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <meta name="description" content="Buy guest posts from 20,000+ verified publisher sites. Filter by DA, niche, country and price. Dofollow backlinks with 12-month guarantee.">
  <meta name="robots" content="index, follow">
  <script>
    // If logged in, redirect to dashboard
    try {
      var u = JSON.parse(localStorage.getItem('uplyncio_user')||'null');
      var li = localStorage.getItem('uplyncio_loggedIn')==='1';
      if(u && li) {
        window.location.replace(u.role==='publisher' ? '/publisher' : '/buyer');
      }
    } catch(e){}
