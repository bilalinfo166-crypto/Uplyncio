<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signing in...</title>
<style>
body{margin:0;background:#07090f;display:flex;align-items:center;justify-content:center;height:100vh;font-family:Arial,sans-serif}
.box{text-align:center;color:#fff}
.logo{font-size:24px;font-weight:900;margin-bottom:16px}
.logo span{color:#4f7cff}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#4f7cff;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
p{color:rgba(255,255,255,.5);font-size:14px;margin:0}
</style>
</head>
<body>
<div class="box">
  <div class="logo">Uply<span>ncio</span></div>
  <div class="spinner"></div>
  <p>Signing you in...</p>
</div>
<script>
(function(){
  try{
    var params = new URLSearchParams(window.location.search);
    var raw = params.get('u') || '{}';
    var dest = params.get('dest') || 'buyer.html';
    var user = JSON.parse(decodeURIComponent(raw));

    if(user && user.email){
      var uid = user.id || ('g_'+Date.now());
      var fullUser = {
        uid: uid, id: uid,
        name: user.name || '',
        email: user.email,
        role: user.role || 'buyer',
        verified: true,
        email_verified: true,
        publisher_verified: user.publisher_verified || false,
        google: true
      };

      localStorage.setItem('uplyncio_loggedIn', '1');
      localStorage.setItem('uplyncio_currentUid', uid);
      localStorage.setItem('uplyncio_user', JSON.stringify(fullUser));
      localStorage.setItem('uplyncio_data_'+uid, JSON.stringify(fullUser));
      localStorage.setItem('uplyncio_settings', JSON.stringify({
        settName: fullUser.name,
        settEmail: fullUser.email
      }));

      window.location.replace(dest);
    } else {
      window.location.replace('uplyncio-full.html');
    }
  } catch(e){
    window.location.replace('uplyncio-full.html');
  }
})();
</script>
</body>
</html>
