<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<meta charset="UTF-8">
<link rel="canonical" href="https://uplyncio.com/cart">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<meta name="viewport" content="width=1280">
<meta name="robots" content="noindex, nofollow">
<title>My Cart — Uplyncio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
a{text-decoration:none}
:root{--ac:#4f7cff;--br:#e2e8f0;--bg:#f0f2f7;--tx:#0f172a;--t2:#64748b;--mu:#94a3b8;--wh:#fff;--gn:#16a34a}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}

nav{background:var(--wh);border-bottom:1px solid var(--br);padding:0 32px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{display:flex;align-items:center;gap:10px;font-family:Manrope,sans-serif;font-size:20px;font-weight:800;color:var(--tx)}
.nav-logo em{font-style:normal;color:var(--ac)}
.nav-back{font-size:13px;font-weight:600;color:var(--t2);padding:7px 16px;border:1px solid var(--br);border-radius:8px;transition:all .15s}
.nav-back:hover{color:var(--ac);border-color:var(--ac)}

.tabs-wrap{background:var(--wh);border-bottom:1px solid var(--br);padding:0 32px;display:flex;gap:0}
.tab-btn{padding:13px 24px;font-size:13.5px;font-weight:600;color:var(--mu);border:none;background:none;cursor:pointer;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;display:flex;align-items:center;gap:8px}
.tab-btn:hover{color:var(--tx)}
.tab-btn.act{color:var(--ac);border-bottom-color:var(--ac)}

.page{max-width:1080px;margin:0 auto;width:100%;padding:24px;flex:1;display:flex;gap:24px;align-items:flex-start}
.page-main{flex:1;min-width:0}

.card{background:var(--wh);border:1px solid var(--br);border-radius:14px;padding:18px 22px;margin-bottom:10px;display:flex;align-items:center;gap:16px;transition:all .2s}
.card:hover{border-color:#93c5fd;box-shadow:0 4px 16px rgba(79,124,255,.08)}
.card-icon{width:44px;height:44px;border-radius:11px;background:linear-gradient(135deg,#eff6ff,#e0e7ff);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-title{font-size:14.5px;font-weight:700;color:var(--tx);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-meta{display:flex;gap:12px;flex-wrap:wrap;font-size:12px;color:var(--t2)}
.card-meta strong{color:var(--tx);font-weight:700}
.card-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:6px;background:#eff6ff;color:var(--ac)}
.card-price{font-family:Manrope,sans-serif;font-size:20px;font-weight:800;color:var(--tx);flex-shrink:0;margin:0 8px}
.card-del{width:32px;height:32px;border:1px solid var(--br);background:none;border-radius:8px;cursor:pointer;font-size:13px;color:var(--mu);transition:all .15s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.card-del:hover{border-color:#ef4444;color:#ef4444;background:#fff5f5}

.sidebar{width:300px;flex-shrink:0;position:sticky;top:74px}
.sb-card{background:var(--wh);border:1px solid var(--br);border-radius:14px;padding:22px;margin-bottom:12px}
.sb-title{font-size:15px;font-weight:800;color:var(--tx);margin-bottom:16px}
.sb-row{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin-bottom:10px}
.sb-row span:last-child{font-weight:700;color:var(--tx)}
.sb-divider{border:none;border-top:1px solid var(--br);margin:12px 0}
.sb-total{display:flex;justify-content:space-between;font-size:18px;font-weight:800;color:var(--tx)}
.sb-total span:last-child{color:var(--ac)}
.btn-checkout{width:100%;padding:14px;background:linear-gradient(135deg,#4f7cff,#6366f1);color:#fff;border:none;border-radius:11px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:16px;transition:all .18s}
.btn-checkout:hover{opacity:.92;transform:translateY(-1px)}
.sb-trust{display:flex;gap:12px;justify-content:center;margin-top:14px;font-size:11px;color:var(--mu)}
.sb-help{background:#f0fdf4;border:1px solid #bbf7d0;border-radius:14px;padding:16px 18px;font-size:12.5px;color:#15803d;line-height:1.65}
.sb-help a{color:#15803d;font-weight:700}

.empty{text-align:center;padding:80px 20px}
.empty-icon{font-size:52px;margin-bottom:16px;opacity:.2}
.empty h3{font-size:17px;font-weight:700;color:var(--tx);margin-bottom:6px}
.empty p{font-size:13px;color:var(--mu);margin-bottom:20px}
.btn-browse{display:inline-block;padding:11px 28px;background:var(--ac);color:#fff;border-radius:10px;font-size:14px;font-weight:700;transition:all .15s}
.btn-browse:hover{opacity:.9}

.saved-card{background:var(--wh);border:1px solid var(--br);border-radius:14px;padding:16px 20px;margin-bottom:10px;display:flex;align-items:center;gap:14px}
.btn-sm{padding:8px 14px;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.btn-add{background:var(--ac);color:#fff}
.btn-add:hover{opacity:.9}
.btn-rm{background:#fee2e2;color:#ef4444}
.btn-rm:hover{background:#fecaca}
</style>
<link rel="stylesheet" href="/shared.css">
</head>
<body>
<nav>
<a href="/" class="nav-logo">
<svg width="30" height="30" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#0f1628"/><rect x="8" y="22" width="22" height="16" rx="8" fill="none" stroke="#4f7cff" stroke-width="5"/><rect x="34" y="22" width="22" height="16" rx="8" fill="none" stroke="#00d4aa" stroke-width="5"/><rect x="31" y="26" width="6" height="8" fill="#0f1628"/></svg>
Uply<em>ncio</em>
</a>
<a href="buyer.html" class="nav-back">← Back to Marketplace</a>
</nav>

<div class="tabs-wrap">
<button class="tab-btn act" id="tabCart" onclick="showTab('cart')">My Cart <span id="cntCart" style="background:var(--ac);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">0</span></button>
<button class="tab-btn" id="tabSaved" onclick="showTab('saved')">Saved Sites <span id="cntSaved" style="background:var(--mu);color:#fff;border-radius:20px;padding:1px 8px;font-size:11px;font-weight:700">0</span></button>
</div>

<!-- CART VIEW -->
<div id="viewCart" class="page">
<div class="page-main" id="cartList"></div>
<div class="sidebar" id="summaryBox" style="display:none">
<div class="sb-card">
<div class="sb-title">Order summary</div>
<div class="sb-row"><span>Items</span><span id="sumItems">0</span></div>
<div class="sb-row"><span>Subtotal</span><span id="sumSub">$0</span></div>
<hr class="sb-divider">
<div class="sb-total"><span>Total</span><span id="sumTotal">$0</span></div>
<button class="btn-checkout" onclick="proceedCheckout()">Proceed to checkout</button>
<div class="sb-trust"><span>🔒 SSL secured</span><span>💳 PayPal / Crypto</span><span>🛡 12-mo guarantee</span></div>
</div>
<div class="sb-help">Need bulk orders or a custom package? Email <a href="mailto:info@uplyncio.com">info@uplyncio.com</a> — we respond within 24 hours.</div>
</div>
</div>

<!-- SAVED VIEW -->
<div id="viewSaved" class="page" style="display:none">
<div class="page-main" id="savedList"></div>
</div>

<script>
function showTab(t){
document.getElementById('viewCart').style.display=t==='cart'?'flex':'none';
document.getElementById('viewSaved').style.display=t==='saved'?'flex':'none';
document.getElementById('tabCart').className='tab-btn'+(t==='cart'?' act':'');
document.getElementById('tabSaved').className='tab-btn'+(t==='saved'?' act':'');
if(t==='cart') renderCart(); else renderSaved();
}

function renderCart(){
var items=JSON.parse(localStorage.getItem('uplyncio_cart_items')||'[]');
var list=document.getElementById('cartList');
var box=document.getElementById('summaryBox');
document.getElementById('cntCart').textContent=items.length;
if(!items.length){
list.innerHTML='<div class="empty"><div class="empty-icon">🛒</div><h3>Your cart is empty</h3><p>Browse our marketplace and add sites to get started.</p><a href="buyer.html" class="btn-browse">Browse marketplace</a></div>';
box.style.display='none'; return;
}
var total=0;
list.innerHTML=items.map(function(item,i){
var price=parseFloat(item.price)||0; total+=price;
var svc=item.service==='li'?'Link Insertion':'Guest Post';
return '<div class="card"><div class="card-icon">🌐</div><div class="card-body"><div class="card-title">'+(item.url||'Unknown')+'</div><div class="card-meta"><span><strong>DA</strong> '+(item.da||'—')+'</span><span><strong>DR</strong> '+(item.dr||'—')+'</span><span class="card-tag">'+svc+'</span></div></div><div class="card-price">$'+price.toFixed(0)+'</div><button class="card-del" onclick="removeItem('+i+')" title="Remove">✕</button></div>';
}).join('');
box.style.display='block';
document.getElementById('sumItems').textContent=items.length;
document.getElementById('sumSub').textContent='$'+total.toFixed(2);
document.getElementById('sumTotal').textContent='$'+total.toFixed(2);
}

function removeItem(i){
var items=JSON.parse(localStorage.getItem('uplyncio_cart_items')||'[]');
if(items[i]) localStorage.removeItem('cart_'+(items[i].service==='li'?'li_':'')+items[i].url);
items.splice(i,1);
localStorage.setItem('uplyncio_cart_items',JSON.stringify(items));
renderCart();
}

function renderSaved(){
var items=JSON.parse(localStorage.getItem('uplyncio_saved_sites')||'[]');
var list=document.getElementById('savedList');
document.getElementById('cntSaved').textContent=items.length;
if(!items.length){
list.innerHTML='<div class="empty"><div class="empty-icon">❤️</div><h3>No saved sites</h3><p>Tap the heart icon on any site to save it for later.</p><a href="buyer.html" class="btn-browse">Browse marketplace</a></div>';
return;
}
list.innerHTML=items.map(function(item,i){
return '<div class="saved-card"><div class="card-icon">🌐</div><div class="card-body" style="flex:1"><div class="card-title">'+(item.url||'Unknown')+'</div><div class="card-meta"><span><strong>DA</strong> '+(item.da||'—')+'</span><span><strong>DR</strong> '+(item.dr||'—')+'</span></div></div><div class="card-price" style="font-size:17px">$'+(parseFloat(item.price||item.gP||0)).toFixed(0)+'</div><button class="btn-sm btn-add" onclick="addToCart('+i+')">+ Add to cart</button><button class="btn-sm btn-rm" onclick="removeSaved('+i+')">✕</button></div>';
}).join('');
}

function addToCart(i){
var saved=JSON.parse(localStorage.getItem('uplyncio_saved_sites')||'[]');
var cart=JSON.parse(localStorage.getItem('uplyncio_cart_items')||'[]');
if(saved[i]) cart.push(saved[i]);
localStorage.setItem('uplyncio_cart_items',JSON.stringify(cart));
showTab('cart');
}

function removeSaved(i){
var items=JSON.parse(localStorage.getItem('uplyncio_saved_sites')||'[]');
if(items[i]) localStorage.removeItem('saved_'+items[i].url);
items.splice(i,1);
localStorage.setItem('uplyncio_saved_sites',JSON.stringify(items));
renderSaved();
}

function proceedCheckout(){
alert('To complete your order, use your wallet balance or contact info@uplyncio.com');
}

// Init
if(window.location.hash==='#saved') showTab('saved');
else showTab('cart');
</script>
<script src="/chatbot.js" defer></script>
</body>
</html>
