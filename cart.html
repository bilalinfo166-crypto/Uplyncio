<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Cart — Uplyncio</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ac:#4f7cff;--br:#e2e8f0;--bg:#f0f2f7;--tx:#1a202c;--t2:#64748b;--mu:#94a3b8;--wh:#fff;--r:12px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}

/* NAV */
.nav{background:var(--wh);border-bottom:1px solid var(--br);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.nav-logo{font-family:Manrope,sans-serif;font-size:20px;font-weight:800;color:var(--tx);text-decoration:none}
.nav-logo em{font-style:normal;color:var(--ac)}
.nav-back{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--t2);text-decoration:none;cursor:pointer}
.nav-back:hover{color:var(--ac)}

/* LAYOUT */
.layout{display:flex;flex:1;max-width:1200px;margin:0 auto;width:100%;padding:24px 20px;gap:24px}

/* SIDEBAR */
.sidebar{width:200px;flex-shrink:0}
.sb-section-title{font-size:11px;font-weight:700;color:var(--mu);text-transform:uppercase;letter-spacing:.5px;padding:0 12px;margin-bottom:8px;margin-top:16px}
.sb-link{display:flex;align-items:center;gap:10px;width:100%;padding:10px 12px;border:none;background:none;font-size:13.5px;font-weight:600;color:var(--t2);cursor:pointer;border-radius:9px;text-align:left;font-family:inherit;transition:all .15s;text-decoration:none}
.sb-link:hover{background:#f0f4ff;color:var(--ac)}
.sb-link.act{background:#eff6ff;color:var(--ac)}
.sb-icon{font-size:16px;width:20px;text-align:center}

/* MAIN */
.main{flex:1}
.page-title{font-family:Manrope,sans-serif;font-size:22px;font-weight:800;color:var(--tx);margin-bottom:20px}

/* CART ITEMS */
.cart-item{background:var(--wh);border:1px solid var(--br);border-radius:14px;padding:16px 20px;margin-bottom:12px;display:flex;align-items:center;gap:16px}
.cart-item-info{flex:1}
.cart-item-site{font-size:15px;font-weight:700;color:var(--tx);margin-bottom:4px}
.cart-item-type{font-size:12.5px;color:var(--t2)}
.cart-item-price{font-family:Manrope,sans-serif;font-size:18px;font-weight:800;color:var(--tx)}
.cart-item-remove{width:30px;height:30px;border:1px solid var(--br);background:var(--bg);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--mu);transition:all .15s}
.cart-item-remove:hover{border-color:#ef4444;color:#ef4444;background:#fee2e2}

/* ORDER SUMMARY */
.order-summary{background:var(--wh);border:1px solid var(--br);border-radius:14px;padding:20px;position:sticky;top:76px;width:280px;flex-shrink:0}
.summary-title{font-size:14px;font-weight:800;color:var(--tx);margin-bottom:16px}
.summary-row{display:flex;justify-content:space-between;font-size:13px;color:var(--t2);margin-bottom:10px}
.summary-total{display:flex;justify-content:space-between;font-size:16px;font-weight:800;color:var(--tx);padding-top:12px;border-top:1px solid var(--br);margin-top:4px}
.btn-checkout{width:100%;padding:13px;background:linear-gradient(135deg,var(--ac),#6366f1);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:14px}
.btn-checkout:hover{opacity:.9}

.empty-state{text-align:center;padding:60px 20px;color:var(--mu)}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:.3}
.empty-state h3{font-size:16px;font-weight:700;color:var(--t2);margin-bottom:8px}
.empty-state p{font-size:13px}
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <a href="buyer.html" class="nav-logo">Uply<em>ncio</em></a>
  <a href="buyer.html" class="nav-back">← Back to Browse</a>
</nav>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sb-section-title">Browse</div>
    <a href="buyer.html" class="sb-link" style="text-decoration:none"><div class="sb-icon">🌐</div> All Sites</a>
    <button class="sb-link" onclick="showOrders()"><div class="sb-icon">📦</div> My Orders</button>
    <button class="sb-link act" id="sb-cart"><div class="sb-icon">🛒</div> My Cart</button>
    <button class="sb-link" onclick="showSaved()"><div class="sb-icon">❤️</div> Saved Sites</button>
    <a href="buyer.html" class="sb-link" style="text-decoration:none"><div class="sb-icon">✍️</div> Order Content</a>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="main">
    <!-- MY CART VIEW -->
    <div id="view-cart">
      <div class="page-title">🛒 My Cart</div>
      <div style="display:flex;gap:20px;align-items:flex-start">
        <div style="flex:1" id="cartItemsList"></div>
        <div class="order-summary" id="cartSummaryBox" style="display:none">
          <div class="summary-title">Order Summary</div>
          <div class="summary-row"><span>Items</span><span id="sumCount">0</span></div>
          <div class="summary-row"><span>Subtotal</span><span id="sumSubtotal">$0.00</span></div>
          <div class="summary-total"><span>Total</span><span id="sumTotal">$0.00</span></div>
          <button class="btn-checkout" onclick="alert('Contact info@uplyncio.com to complete your order')">Proceed to Checkout →</button>
          <div style="font-size:11px;color:var(--mu);text-align:center;margin-top:10px">🔒 Secure checkout · SSL encrypted</div>
        </div>
      </div>
    </div>

    <!-- SAVED SITES VIEW -->
    <div id="view-saved" style="display:none">
      <div class="page-title">❤️ Saved Sites</div>
      <div id="savedItemsList"></div>
    </div>

    <!-- MY ORDERS VIEW -->
    <div id="view-orders" style="display:none">
      <div class="page-title">📦 My Orders</div>
      <div id="ordersListCart"></div>
    </div>
  </div>
</div>

<script>
function renderCart(){
  var items = JSON.parse(localStorage.getItem('uplyncio_cart_items')||'[]');
  var list = document.getElementById('cartItemsList');
  var summaryBox = document.getElementById('cartSummaryBox');

  if(!items.length){
    list.innerHTML = '<div class="empty-state"><div class="icon">🛒</div><h3>Your cart is empty</h3><p>Browse sites and add them to your cart</p><br><a href="buyer.html" style="padding:10px 24px;background:var(--ac);color:#fff;border-radius:9px;text-decoration:none;font-size:13.5px;font-weight:700">Browse Sites</a></div>';
    summaryBox.style.display='none';
    return;
  }

  summaryBox.style.display='block';
  var total = 0;
  list.innerHTML = items.map(function(item, i){
    var price = parseFloat(item.price)||0;
    total += price;
    return '<div class="cart-item">'
      +'<div class="cart-item-info">'
        +'<div class="cart-item-site">'+item.site+'</div>'
        +'<div class="cart-item-type">'+( item.type||'Article Posting')+'</div>'
      +'</div>'
      +'<div class="cart-item-price">$'+price.toFixed(2)+'</div>'
      +'<button class="cart-item-remove" onclick="removeFromCart('+i+')" title="Remove">✕</button>'
    +'</div>';
  }).join('');

  document.getElementById('sumCount').textContent = items.length;
  document.getElementById('sumSubtotal').textContent = '$'+total.toFixed(2);
  document.getElementById('sumTotal').textContent = '$'+total.toFixed(2);
}

function removeFromCart(idx){
  var items = JSON.parse(localStorage.getItem('uplyncio_cart_items')||'[]');
  items.splice(idx,1);
  localStorage.setItem('uplyncio_cart_items', JSON.stringify(items));
  renderCart();
}

function renderSaved(){
  var items = JSON.parse(localStorage.getItem('uplyncio_saved_sites')||'[]');
  var list = document.getElementById('savedItemsList');
  if(!items.length){
    list.innerHTML = '<div class="empty-state"><div class="icon">❤️</div><h3>No saved sites yet</h3><p>Heart any site to save it for later</p><br><a href="buyer.html" style="padding:10px 24px;background:var(--ac);color:#fff;border-radius:9px;text-decoration:none;font-size:13.5px;font-weight:700">Browse Sites</a></div>';
    return;
  }
  list.innerHTML = items.map(function(item,i){
    return '<div class="cart-item">'
      +'<div class="cart-item-info">'
        +'<div class="cart-item-site">'+(item.url||item.site||'Site')+'</div>'
        +'<div class="cart-item-type">'+(item.niche||'Guest Post')+'</div>'
      +'</div>'
      +'<button onclick="addToCart('+i+')" style="padding:7px 14px;background:var(--ac);color:#fff;border:none;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:8px">Add to Cart</button>'
      +'<button class="cart-item-remove" onclick="removeSaved('+i+')" title="Remove">✕</button>'
    +'</div>';
  }).join('');
}

function addToCart(idx){
  var saved = JSON.parse(localStorage.getItem('uplyncio_saved_sites')||'[]');
  var cart = JSON.parse(localStorage.getItem('uplyncio_cart_items')||'[]');
  if(saved[idx]) cart.push(saved[idx]);
  localStorage.setItem('uplyncio_cart_items', JSON.stringify(cart));
  showCart();
}

function removeSaved(idx){
  var items = JSON.parse(localStorage.getItem('uplyncio_saved_sites')||'[]');
  items.splice(idx,1);
  localStorage.setItem('uplyncio_saved_sites', JSON.stringify(items));
  renderSaved();
}

function renderOrders(){
  var orders = JSON.parse(localStorage.getItem('uplyncio_buyer_orders')||'[]');
  var list = document.getElementById('ordersListCart');
  if(!orders.length){
    list.innerHTML = '<div class="empty-state"><div class="icon">📦</div><h3>No orders yet</h3><p>Place your first order from the site listings</p><br><a href="buyer.html" style="padding:10px 24px;background:var(--ac);color:#fff;border-radius:9px;text-decoration:none;font-size:13.5px;font-weight:700">Browse Sites</a></div>';
    return;
  }
  var statusColors = {'Pending':'#f59e0b','In Progress':'#3b82f6','Completed':'#16a34a','Rejected':'#ef4444'};
  list.innerHTML = orders.map(function(o){
    var sc = statusColors[o.status]||'#94a3b8';
    return '<div class="cart-item">'
      +'<div class="cart-item-info">'
        +'<div class="cart-item-site">'+(o.site||'Unknown')+'<span style="margin-left:10px;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:700;background:'+sc+'22;color:'+sc+'">'+o.status+'</span></div>'
        +'<div class="cart-item-type">'+(o.type||'Article Posting')+' · '+(o.id||'')+'</div>'
      +'</div>'
      +'<div class="cart-item-price">$'+(o.price||'—')+'</div>'
    +'</div>';
  }).join('');
}

function showCart(){
  document.getElementById('view-cart').style.display='block';
  document.getElementById('view-saved').style.display='none';
  document.getElementById('view-orders').style.display='none';
  document.querySelectorAll('.sb-link').forEach(function(b){b.classList.remove('act')});
  document.getElementById('sb-cart').classList.add('act');
  renderCart();
}

function showSaved(){
  document.getElementById('view-cart').style.display='none';
  document.getElementById('view-saved').style.display='block';
  document.getElementById('view-orders').style.display='none';
  renderSaved();
}

function showOrders(){
  document.getElementById('view-cart').style.display='none';
  document.getElementById('view-saved').style.display='none';
  document.getElementById('view-orders').style.display='block';
  renderOrders();
}

// Init
var hash = window.location.hash;
if(hash==='#saved') showSaved();
else if(hash==='#orders') showOrders();
else showCart();
</script>
</body>
</html>
